<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leads OS — Minimal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #000000;
    --surface: #0A0A0A;
    --surface-hover: #141414;
    --border: #222222;
    --border-hover: #333333;
    --text: #EDEDED;
    --muted: #888888;
    --accent: #FFFFFF;
    --radius: 8px;
    --font: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; outline: none; }

  /* -- LAYOUT -- */
  .app { display: flex; flex-direction: column; height: 100vh; }
  .header { padding: 20px 32px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--surface); }
  .logo { font-size: 16px; font-weight: 600; letter-spacing: -0.5px; }
  .stats { display: flex; gap: 16px; font-size: 12px; color: var(--muted); }
  .stats span { color: var(--text); font-weight: 500; }

  .main { flex: 1; overflow: hidden; display: flex; flex-direction: column; padding: 32px; }

  /* -- UPLOAD ZONE -- */
  .upload-zone { border: 1px dashed var(--border); border-radius: var(--radius); padding: 60px 20px; text-align: center; transition: all 0.2s; background: var(--surface); cursor: pointer; position: relative; }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--muted); background: var(--surface-hover); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .uz-title { font-size: 15px; font-weight: 500; margin-bottom: 8px; color: var(--text); }
  .uz-sub { color: var(--muted); }

  /* -- DATA GRID -- */
  .grid-container { display: none; flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .grid-header { display: grid; grid-template-columns: 2fr 2fr 1.5fr 1fr 100px; padding: 0 16px 12px; border-bottom: 1px solid var(--border); color: var(--muted); font-weight: 500; font-size: 12px; }
  .grid-body { flex: 1; overflow-y: auto; padding-top: 8px; }
  
  .row { display: grid; grid-template-columns: 2fr 2fr 1.5fr 1fr 100px; padding: 12px 16px; align-items: center; border-bottom: 1px solid var(--border); transition: background 0.15s; border-radius: 6px; }
  .row:hover { background: var(--surface-hover); }
  
  .cell { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 16px; }
  .brand-name { font-weight: 500; margin-bottom: 2px; }
  .brand-link { color: var(--muted); font-size: 12px; }
  .brand-link:hover { color: var(--text); text-decoration: underline; }

  .contact-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 12px; }
  .contact-item span { color: var(--muted); cursor: pointer; transition: color 0.15s; }
  .contact-item span:hover { color: var(--text); }

  .social-links { display: flex; gap: 8px; }
  .soc-btn { display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 6px; background: var(--bg); border: 1px solid var(--border); color: var(--muted); transition: all 0.15s; }
  .soc-btn:hover { background: var(--border); color: var(--text); }

  select.status { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; outline: none; appearance: none; width: 100%; }
  select.status:hover { border-color: var(--muted); }
  
  .btn-action { background: var(--text); color: var(--bg); padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; transition: opacity 0.15s; text-align: center; }
  .btn-action:hover { opacity: 0.8; }

  /* -- SLIDE OVER -- */
  .slide-over { position: fixed; top: 0; right: -450px; width: 400px; height: 100vh; background: var(--surface); border-left: 1px solid var(--border); padding: 32px; transition: right 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 100; display: flex; flex-direction: column; box-shadow: -10px 0 40px rgba(0,0,0,0.5); }
  .slide-over.open { right: 0; }
  .so-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 99; }
  .so-overlay.open { opacity: 1; pointer-events: all; }
  
  .so-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .so-title { font-size: 18px; font-weight: 600; }
  .so-close { background: none; color: var(--muted); font-size: 20px; }
  .so-close:hover { color: var(--text); }

  .script-box { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 24px; }
  .script-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 12px; }
  textarea { width: 100%; height: 250px; background: transparent; border: none; color: var(--text); font-family: inherit; font-size: 13px; line-height: 1.6; outline: none; resize: none; }

  .btn-primary { width: 100%; background: var(--text); color: var(--bg); padding: 12px; border-radius: 6px; font-size: 13px; font-weight: 600; transition: opacity 0.15s; }
  .btn-primary:hover { opacity: 0.8; }

  /* -- UTILS -- */
  .hidden { display: none !important; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="logo">Leads OS</div>
    <div class="stats">
      <div>Total: <span id="stat-total">0</span></div>
      <div>Contacted: <span id="stat-contacted">0</span></div>
      <button onclick="clearData()" style="background:none; color:var(--muted); text-decoration:underline; font-size:12px; margin-left:16px;">Clear Data</button>
    </div>
  </header>

  <main class="main">
    <div class="upload-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".csv">
      <div class="uz-title">Drop your Bootleads CSV here</div>
      <div class="uz-sub">Stored entirely in your browser. No servers.</div>
    </div>

    <div class="grid-container hidden" id="grid-container">
      <div class="grid-header">
        <div>Brand & Link</div>
        <div>Contact Info</div>
        <div>Socials</div>
        <div>Status</div>
        <div>Action</div>
      </div>
      <div class="grid-body" id="grid-body"></div>
    </div>
  </main>
</div>

<div class="so-overlay" id="overlay" onclick="closePanel()"></div>
<div class="slide-over" id="slide-panel">
  <div class="so-header">
    <div class="so-title" id="panel-brand">Brand Name</div>
    <button class="so-close" onclick="closePanel()">✕</button>
  </div>
  
  <div class="script-box">
    <div class="script-label">Outreach Script (Editable)</div>
    <textarea id="script-text"></textarea>
  </div>
  
  <button class="btn-primary" onclick="copyScript()">Copy to Clipboard</button>
</div>

<script>
  let leads = [];

  // DOM Elements
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const gridContainer = document.getElementById('grid-container');
  const gridBody = document.getElementById('grid-body');
  
  // Drag and Drop
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag'); handleFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

  // Load from LocalStorage on mount
  window.onload = () => {
    const saved = localStorage.getItem('tj_leads');
    if (saved) { leads = JSON.parse(saved); renderGrid(); }
  };

  function handleFile(file) {
    if (!file) return;
    Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      complete: (results) => {
        processBootleads(results.data, results.meta.fields);
      }
    });
  }

  function processBootleads(rows, headers) {
    const getVal = (row, keys) => {
      for (let k of keys) {
        const match = headers.find(h => h.toLowerCase().includes(k));
        if (match && row[match]) return row[match].trim();
      }
      return '';
    };

    const newLeads = rows.map((row, idx) => {
      let url = getVal(row, ['domain', 'store', 'website', 'url']);
      let name = getVal(row, ['name', 'title']);
      if (!name && url) name = url.replace('www.', '').split('.')[0].toUpperCase();

      let ig = getVal(row, ['instagram', 'ig']);
      if (ig && !ig.startsWith('http')) ig = 'https://instagram.com/' + ig.replace('@', '');

      let wa = getVal(row, ['whatsapp', 'wa']);
      if (wa && !wa.startsWith('http')) wa = 'https://wa.me/' + wa.replace(/[^0-9]/g, '');

      return {
        id: 'L' + Date.now() + idx,
        name: name || 'Unknown Store',
        url: url ? (url.startsWith('http') ? url : 'https://' + url) : '',
        email: getVal(row, ['email']),
        phone: getVal(row, ['phone', 'mobile']),
        whatsapp: wa,
        ig: ig,
        fb: getVal(row, ['facebook', 'fb']),
        status: 'Lead'
      };
    });

    leads = [...leads, ...newLeads];
    saveData();
    renderGrid();
  }

  function renderGrid() {
    if (leads.length === 0) {
      dropZone.classList.remove('hidden');
      gridContainer.classList.add('hidden');
      return;
    }

    dropZone.classList.add('hidden');
    gridContainer.classList.remove('hidden');

    gridBody.innerHTML = leads.map(l => `
      <div class="row">
        <div class="cell">
          <div class="brand-name">${l.name}</div>
          ${l.url ? `<a href="${l.url}" target="_blank" class="brand-link">${l.url.replace('https://', '').replace('www.', '')} ↗</a>` : '<span class="brand-link">No URL</span>'}
        </div>
        
        <div class="cell">
          ${l.email ? `<div class="contact-item">✉️ <span onclick="copyToClip('${l.email}')">${l.email}</span></div>` : ''}
          ${l.phone ? `<div class="contact-item">📞 <span onclick="copyToClip('${l.phone}')">${l.phone}</span></div>` : ''}
          ${l.whatsapp ? `<div class="contact-item">💬 <a href="${l.whatsapp}" target="_blank">WhatsApp ↗</a></div>` : ''}
          ${(!l.email && !l.phone && !l.whatsapp) ? '<span style="color:var(--muted);font-size:12px;">No contact info</span>' : ''}
        </div>

        <div class="cell social-links">
          ${l.ig ? `<a href="${l.ig}" target="_blank" class="soc-btn" title="Instagram">IG</a>` : ''}
          ${l.fb ? `<a href="${l.fb}" target="_blank" class="soc-btn" title="Facebook">FB</a>` : ''}
          ${(!l.ig && !l.fb) ? '<span style="color:var(--muted);font-size:12px;">—</span>' : ''}
        </div>

        <div class="cell">
          <select class="status" onchange="updateStatus('${l.id}', this.value)">
            <option value="Lead" ${l.status === 'Lead' ? 'selected' : ''}>Lead</option>
            <option value="Contacted" ${l.status === 'Contacted' ? 'selected' : ''}>Contacted</option>
            <option value="Replied" ${l.status === 'Replied' ? 'selected' : ''}>Replied</option>
            <option value="Closed" ${l.status === 'Closed' ? 'selected' : ''}>Closed</option>
          </select>
        </div>

        <div class="cell">
          <button class="btn-action" onclick="openPanel('${l.id}')">Pitch</button>
        </div>
      </div>
    `).join('');

    updateStats();
  }

  function updateStatus(id, val) {
    const lead = leads.find(l => l.id === id);
    if (lead) { lead.status = val; saveData(); updateStats(); }
  }

  function updateStats() {
    document.getElementById('stat-total').innerText = leads.length;
    document.getElementById('stat-contacted').innerText = leads.filter(l => l.status !== 'Lead').length;
  }

  function copyToClip(text) {
    navigator.clipboard.writeText(text);
    // Simple visual feedback could go here
  }

  // Slide-over Logic
  function openPanel(id) {
    const lead = leads.find(l => l.id === id);
    if(!lead) return;

    document.getElementById('panel-brand').innerText = lead.name;
    
    // Auto-generate a clean, designer-focused pitch
    const firstName = lead.name.split(' ')[0] || 'there';
    const pitch = `Hi ${firstName},\n\nI was looking through your store earlier today and really love the direction you're taking the brand.\n\nI'm a Shopify developer and UI/UX designer. I noticed a few quick friction points on your product pages that are likely causing visitors to bounce before adding to cart.\n\nAre you open to a quick chat this week? I'd love to share a couple of ideas on how to tighten up the design and improve your conversion rate.\n\nBest,\nTeejay`;
    
    document.getElementById('script-text').value = pitch;
    
    document.getElementById('overlay').classList.add('open');
    document.getElementById('slide-panel').classList.add('open');
  }

  function closePanel() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('slide-panel').classList.remove('open');
  }

  function copyScript() {
    const text = document.getElementById('script-text').value;
    copyToClip(text);
    const btn = document.querySelector('.btn-primary');
    btn.innerText = 'Copied!';
    setTimeout(() => btn.innerText = 'Copy to Clipboard', 2000);
  }

  function saveData() { localStorage.setItem('tj_leads', JSON.stringify(leads)); }
  function clearData() { if(confirm('Clear all leads?')) { leads = []; saveData(); renderGrid(); } }
</script>

</body>
</html>
