<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TeeJay Max — Leads Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=DM+Mono:wght@400;500&display=swap');

:root {
  /* DARK MODE (Default) */
  --bg: #08090d; --bg2: #0d0e15; --sidebar: #0a0b12;
  --surface: #0f1018; --surface2: #141520; --surface3: #1a1b2a;
  --border: rgba(255,255,255,0.04); --border2: rgba(255,255,255,0.07); --border3: rgba(255,255,255,0.13);
  --text: #f0f0f8; --muted: rgba(255,255,255,0.30); --muted2: rgba(255,255,255,0.52);
  --accent: #7c5cbf; --accent2: #a67ff0; --accent3: #c9a8ff; --accentbg: rgba(124,92,191,0.10);
  --green: #34d399; --amber: #fbbf24; --red: #f87171; --blue: #60a5fa;
  --fh: 'Syne', sans-serif; --fb: 'DM Sans', sans-serif; --fm: 'DM Mono', monospace;
  --r: 12px; --rl: 18px; --sw: 224px;
}

/* LIGHT MODE OVERRIDES */
body.light-mode {
  --bg: #f3f4f6; --bg2: #ffffff; --sidebar: #ffffff;
  --surface: #ffffff; --surface2: #f9fafb; --surface3: #e5e7eb;
  --border: rgba(0,0,0,0.06); --border2: rgba(0,0,0,0.1); --border3: rgba(0,0,0,0.15);
  --text: #111827; --muted: #9ca3af; --muted2: #4b5563;
  --accent: #6b21a8; --accent2: #7e22ce; --accent3: #581c87; --accentbg: rgba(126, 34, 206, 0.08);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{height:100vh;background:var(--bg);color:var(--text);font-family:var(--fb);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden;display:flex;transition:background 0.3s, color 0.3s;}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:99px}

/* ── MOBILE OVERLAY ── */
.mob-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:19; backdrop-filter:blur(2px); opacity:0; transition:opacity 0.3s; }
.mob-overlay.show { display:block; opacity:1; }

/* ── SIDEBAR ── */
.sidebar{width:var(--sw);background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:20;transition:transform 0.3s ease, background 0.3s, border 0.3s;}
.sb-brand{padding:22px 18px;border-bottom:1px solid var(--border)}
.sb-name{font-family:var(--fh);font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--accent3),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-nav{flex:1;padding:16px 10px;display:flex;flex-direction:column;gap:4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:9px;font-weight:600;color:var(--accent3);background:var(--accentbg);border:1px solid rgba(124,92,191,0.2);cursor:pointer;}
.theme-toggle{margin:auto 10px 20px; padding:10px 12px; border-radius:9px; cursor:pointer; background:var(--surface2); border:1px solid var(--border2); color:var(--text); font-weight:600; display:flex; align-items:center; gap:8px; justify-content:center;}
.theme-toggle:hover{background:var(--surface3);}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden; position:relative;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:64px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.topbar-left {display:flex; align-items:center; gap:16px;}
.topbar-right {display:flex; align-items:center; gap:16px;}
.topbar-title{font-family:var(--fh);font-size:18px;font-weight:700}
.topbar-sub{font-size:12px;color:var(--muted2)}
.theme-btn {background:var(--surface2); border:1px solid var(--border2); color:var(--text); width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.2s;}
.theme-btn:hover {background:var(--surface3); border-color:var(--border3);}

/* ── CONTENT & FILTERS ── */
.content{flex:1;overflow-y:auto;padding:28px;}
.leads-bar{display:flex;gap:12px;align-items:center;margin-bottom:24px;flex-wrap:wrap; background: var(--surface); padding: 12px 16px; border-radius: var(--r); border: 1px solid var(--border2);}
input[type=text], select{background:var(--surface2);border:1px solid var(--border3);border-radius:8px;color:var(--text);padding:10px 14px;font-size:13px;font-family:var(--fb);outline:none;}
input[type=text]:focus, select:focus{border-color:var(--accent2);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border3);background:var(--surface2);color:var(--text);transition:all 0.15s;font-family:var(--fb); justify-content:center;}
.btn:hover{background:var(--surface3); border-color: var(--muted);}

/* ── UPLOAD ZONE ── */
.upload-zone{border:2px dashed var(--border3);border-radius:var(--rl);padding:60px 24px;text-align:center;cursor:pointer;transition:all 0.2s;background:var(--surface);margin-bottom:24px;position:relative}
.upload-zone:hover{border-color:var(--accent2);background:var(--accentbg)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer; z-index: 2;}
.upload-title{font-family:var(--fh);font-size:18px;font-weight:700;margin-bottom:8px}

/* ── LEADS GRID & CARDS ── */
.leads-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.lcard{background:var(--surface);border:1px solid var(--border2);border-radius:var(--rl);padding:20px;display:flex;flex-direction:column;transition:all 0.3s ease;position:relative;}
.lcard:hover{transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.15);}

/* ── CARD STATUS COLOR CODING ── */
.lcard[data-status="Not Contacted"] { border-color: var(--border2); }
.lcard[data-status="Emailed"] { border-color: rgba(96, 165, 250, 0.5); background: rgba(96, 165, 250, 0.05); box-shadow: 0 4px 20px rgba(96, 165, 250, 0.1); }
.lcard[data-status="Replied"] { border-color: rgba(251, 191, 36, 0.5); background: rgba(251, 191, 36, 0.05); box-shadow: 0 4px 20px rgba(251, 191, 36, 0.1); }
.lcard[data-status="Closed"] { border-color: rgba(52, 211, 153, 0.5); background: rgba(52, 211, 153, 0.05); box-shadow: 0 4px 20px rgba(52, 211, 153, 0.1); }
.lcard[data-status="Discarded"] { border-color: rgba(248, 113, 113, 0.3); background: rgba(248, 113, 113, 0.03); opacity: 0.6; }
.lcard[data-status="Discarded"]:hover { opacity: 0.9; border-color: rgba(248, 113, 113, 0.6); }

.lcard-head{display:flex;justify-content:space-between;margin-bottom:8px;}
.lcard-name{font-family:var(--fh);font-size:16px;font-weight:700;}
.niche-tag{font-size:10px;font-family:var(--fm);padding:4px 10px;border-radius:99px;background:var(--accentbg);border:1px solid rgba(124,92,191,0.2);color:var(--accent3);display:inline-block;margin-bottom:12px;}

.info-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.info-row{display:flex;align-items:center;gap:8px;font-size:12px;}
.ii{width:18px;text-align:center;opacity:0.8; font-size:14px;}
.iv{color:var(--muted2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
.iv a{color:var(--accent3);text-decoration:none;}
.iv a:hover{text-decoration:underline;}
.miss{color:var(--red); opacity: 0.7;}

.status-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px; padding-top: 12px; border-top: 1px solid var(--border2);}
.status-label{font-size:10px;font-family:var(--fm);text-transform:uppercase;color:var(--muted);}
.status-sel{font-size:11px;padding:6px 8px;border-radius:6px;background:var(--surface2); cursor: pointer; color: var(--text); border: 1px solid var(--border3); font-weight: 600; outline:none;}

.socials-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.social-btn{padding:6px 10px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;border:1px solid var(--border2);background:var(--surface2);color:var(--muted2);transition:all 0.15s; display: flex; align-items: center; gap: 6px;}
.social-btn:hover{background:var(--surface3);color:var(--text); border-color:var(--border3);}
.social-btn.ig:hover{color: #E1306C; border-color: #E1306C;}
.social-btn.wa:hover{color: #25D366; border-color: #25D366;}
.social-btn.fb:hover{color: #1877F2; border-color: #1877F2;}
.social-btn.tw:hover{color: #1DA1F2; border-color: #1DA1F2;}
.social-btn.yt:hover{color: #FF0000; border-color: #FF0000;}

.card-btns{display:flex;gap:8px;margin-top: auto;}
.cb{flex:1;padding:10px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border2);background:var(--surface2);color:var(--text);transition:all 0.15s;}
.cb:hover{background:var(--surface3); border-color: var(--border3);}

/* ── PROFILE MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s; padding:20px;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border3);border-radius:var(--rl);width:100%;max-width:500px;padding:32px; display:flex;flex-direction:column;gap:20px; position:relative; max-height: 90vh; overflow-y: auto;}
.modal-close{position:absolute;top:20px;right:24px;background:none;border:none;color:var(--muted2);font-size:24px;cursor:pointer; transition: color 0.2s;}
.modal-close:hover{color:var(--text);}
.prof-header{border-bottom: 1px solid var(--border2); padding-bottom: 16px; padding-right: 20px;}
.prof-title{font-family:var(--fh);font-size:24px;font-weight:800; margin-bottom:4px; word-break: break-word;}
.prof-url{color:var(--accent2); text-decoration: none; font-weight: 500; word-break: break-all;}
.prof-url:hover{text-decoration: underline;}
.prof-section{display:flex; flex-direction:column; gap:8px;}
.prof-label{font-size:10px; font-family:var(--fm); text-transform:uppercase; color:var(--muted); letter-spacing:1px;}
.prof-val{font-size:14px; font-weight:500; color:var(--text); background: var(--surface2); padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border2); word-break: break-word;}
.prof-socials{display:flex; gap:8px; flex-wrap:wrap; margin-top: 8px;}

.load-more-container { text-align: center; padding: 20px 0; grid-column: 1 / -1; }
.hidden{display:none !important;}

/* ── BOTTOM NAVIGATION (MOBILE ONLY) ── */
.mob-nav { display: none; }

/* ── MOBILE RESPONSIVENESS ── */
@media (max-width: 768px) {
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); width: 260px; box-shadow: 4px 0 24px rgba(0,0,0,0.5); }
  .sidebar.open { transform: translateX(0); }
  
  .topbar { padding: 0 16px; height: 60px; }
  .topbar-title { font-size: 16px; }
  .topbar-sub { display: none; } 
  
  .content { padding: 16px; padding-bottom: 100px; }
  
  .leads-bar { flex-direction: column; align-items: stretch; gap: 10px; padding: 16px; }
  input[type=text], select, .btn { width: 100%; }
  
  .leads-grid { grid-template-columns: 1fr; }
  
  .modal { padding: 24px 20px; max-height: 85vh; }
  .prof-title { font-size: 20px; }
  
  .upload-zone { padding: 40px 16px; }

  .mob-nav {
    display: flex;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(15, 16, 24, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    z-index: 80;
    padding-bottom: env(safe-area-inset-bottom);
  }
  
  body.light-mode .mob-nav {
    background: rgba(255, 255, 255, 0.85);
  }

  .mob-nav button {
    flex: 1;
    padding: 12px 0 10px;
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 10px;
    font-weight: 600;
    font-family: var(--fb);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
  }
  .mob-nav button i { font-size: 20px; color: var(--text); }
  .mob-nav button:active { opacity: 0.7; }
}
</style>
</head>
<body class="dark-mode">

<div class="mob-overlay" id="mob-overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sb-brand">
    <div class="sb-name">TeeJay Max</div>
  </div>
  <nav class="sb-nav">
    <div class="nav-item" onclick="if(window.innerWidth <= 768) toggleSidebar();"><i class="fa-solid fa-bullseye"></i> Leads Manager</div>
  </nav>
</aside>

<main class="main">
  <header class="topbar">
    <div class="topbar-left">
      <div>
        <div class="topbar-title">Bootleads Pipeline</div>
        <div class="topbar-sub">Filter, analyze, and organize your prospects.</div>
      </div>
    </div>
    <div class="topbar-right">
      <div style="font-size: 12px; color: var(--muted2); text-align: right;">
        Total: <span id="stat-total" style="color:var(--text);font-weight:600;">0</span><br> 
        Contacted: <span id="stat-contacted" style="color:var(--green);font-weight:600;">0</span>
      </div>
      <button class="theme-btn" onclick="toggleTheme()" title="Toggle Theme">
        <i class="fa-solid fa-moon" id="theme-icon"></i>
      </button>
    </div>
  </header>

  <div class="content" id="scroll-area">
    
    <div class="leads-bar" id="leads-bar" style="display:none;">
      <input type="text" id="search" placeholder="Search brands, locations, niches...">
      
      <select id="filter-platform" title="Filter by Social Channel">
        <option value="All">All Channels</option>
        <option value="ig">📸 Instagram Only</option>
        <option value="wa">💬 WhatsApp Only</option>
        <option value="fb">👥 Facebook Only</option>
        <option value="tw">𝕏 X (Twitter) Only</option>
        <option value="tt">🎵 TikTok Only</option>
        <option value="li">💼 LinkedIn Only</option>
        <option value="email">✉️ Email Only</option>
      </select>

      <select id="filter-status">
        <option value="All">All Statuses</option>
        <option value="Not Contacted">Not Contacted</option>
        <option value="Emailed">Emailed</option>
        <option value="Replied">Replied</option>
        <option value="Closed">Closed 🎉</option>
        <option value="Discarded">Discarded 🗑️</option>
      </select>
      <button class="btn" onclick="clearData()" style="color: var(--red); border-color: rgba(248,113,113,0.3);"><i class="fa-solid fa-trash-can"></i> Clear All</button>
    </div>

    <div class="upload-zone" id="drop-zone">
      <input type="file" id="file-input" accept=".csv, text/csv, application/csv, application/vnd.ms-excel, text/plain">
      <div id="drop-zone-text">
        <div class="upload-title">Drop Bootleads CSV Here</div>
        <div style="color: var(--muted2);">Processed locally. Zero server uploads.</div>
      </div>
    </div>

    <div class="leads-grid" id="leads-grid"></div>
  </div>
</main>

<nav class="mob-nav">
  <button onclick="toggleSidebar()">
    <i class="fa-solid fa-bars"></i>
    <span>Menu</span>
  </button>
  <button onclick="mobSearch()">
    <i class="fa-solid fa-magnifying-glass"></i>
    <span>Search</span>
  </button>
  <button onclick="document.getElementById('file-input').click()">
    <i class="fa-solid fa-cloud-arrow-up"></i>
    <span>Upload</span>
  </button>
</nav>

<div class="modal-overlay" id="profile-modal" onclick="if(event.target===this) closeProfile()">
  <div class="modal">
    <button class="modal-close" onclick="closeProfile()"><i class="fa-solid fa-xmark"></i></button>
    
    <div class="prof-header">
      <div class="niche-tag" id="pm-niche" style="margin-bottom:8px;">Niche</div>
      <div class="prof-title" id="pm-brand">Brand Name</div>
      <a href="#" target="_blank" class="prof-url" id="pm-url">store.com</a>
    </div>

    <div class="prof-section">
      <div class="prof-label">Location</div>
      <div class="prof-val" id="pm-location">—</div>
    </div>

    <div class="prof-section">
      <div class="prof-label">Email</div>
      <div class="prof-val" id="pm-email">—</div>
    </div>

    <div class="prof-section">
      <div class="prof-label">Followers / Products</div>
      <div class="prof-val" id="pm-followers">—</div>
    </div>

    <div class="prof-section">
      <div class="prof-label">Social Channels</div>
      <div class="prof-socials" id="pm-socials"></div>
    </div>
  </div>
</div>

<script>
  let leads = [];
  let filteredLeads = [];
  let displayCount = 50; 

  const regionNames = new Intl.DisplayNames(['en'], { type: 'region' });

  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const dropZoneText = document.getElementById('drop-zone-text');
  const leadsGrid = document.getElementById('leads-grid');
  const leadsBar = document.getElementById('leads-bar');
  const scrollArea = document.getElementById('scroll-area');
  const sidebar = document.getElementById('sidebar');
  const mobOverlay = document.getElementById('mob-overlay');
  
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = 'var(--accent2)'; });
  dropZone.addEventListener('dragleave', () => dropZone.style.borderColor = 'var(--border3)');
  dropZone.addEventListener('drop', e => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
  
  document.getElementById('search').addEventListener('input', () => { displayCount = 50; filterAndRender(); });
  document.getElementById('filter-status').addEventListener('change', () => { displayCount = 50; filterAndRender(); });
  document.getElementById('filter-platform').addEventListener('change', () => { displayCount = 50; filterAndRender(); });

  scrollArea.addEventListener('scroll', () => {
    if (scrollArea.scrollTop + scrollArea.clientHeight >= scrollArea.scrollHeight - 100) {
      if (displayCount < filteredLeads.length) {
        displayCount += 50;
        renderGridChunk();
      }
    }
  });

  window.onload = () => {
    if(localStorage.getItem('tmx_theme') === 'light') { 
      document.body.classList.add('light-mode'); 
      document.getElementById('theme-icon').className = 'fa-solid fa-sun';
    }
    const saved = localStorage.getItem('tmx_leads_v16');
    if (saved) { leads = JSON.parse(saved); filterAndRender(); }
  };

  function mobSearch() {
    const searchInput = document.getElementById('search');
    if (document.getElementById('leads-bar').style.display !== 'none') {
      scrollArea.scrollTo({ top: 0, behavior: 'smooth' });
      setTimeout(() => searchInput.focus(), 300);
    } else {
      document.getElementById('file-input').click();
    }
  }

  function toggleSidebar() {
    sidebar.classList.toggle('open');
    mobOverlay.classList.toggle('show');
  }

  function toggleTheme() {
    const isLight = document.body.classList.toggle('light-mode');
    localStorage.setItem('tmx_theme', isLight ? 'light' : 'dark');
    document.getElementById('theme-icon').className = isLight ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
  }

  function handleFile(file) {
    if (!file) return;
    dropZoneText.innerHTML = '<div class="upload-title">Processing Data...</div>';
    Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      complete: (results) => {
        processCSV(results.data, results.meta.fields);
        fileInput.value = ''; 
      }
    });
  }

  function buildSocialLink(raw, platform) {
      if (!raw) return '';
      raw = String(raw).trim();
      const lower = raw.toLowerCase();
      if (lower === 'n/a' || lower === '-' || lower === 'null' || lower === 'none') return '';

      let checkJunk = raw.replace(/^@/, '').trim();
      const ipRegex = /^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}$/;
      if (ipRegex.test(checkJunk)) return ''; 

      let testUrl = raw.startsWith('http') ? raw : 'https://' + raw;
      
      try {
          let urlObj = new URL(testUrl);
          
          let isPlatformMatch = urlObj.hostname.includes(platform) || 
                                (platform === 'twitter' && urlObj.hostname.includes('x.com')) ||
                                (platform === 'youtube' && urlObj.hostname.includes('youtu.be'));

          if (isPlatformMatch) {
              if (platform === 'instagram' || platform === 'twitter' || platform === 'tiktok') {
                  return urlObj.origin + urlObj.pathname;
              }
              return urlObj.href; 
          }
          
          if (urlObj.hostname.includes('.')) {
              if (urlObj.hostname.includes('linktr.ee')) return urlObj.href; 
              return ''; 
          }
      } catch(e) {}

      let handle = raw;
      handle = handle.split('/').pop(); 
      handle = handle.replace(/^@/, ''); 
      handle = handle.split('?')[0]; 
      
      if (!handle) return '';
      if (handle.includes('.com') || handle.includes('.co') || handle.includes('.net') || handle.includes('.org')) return ''; 
      if (handle.length > 50) return '';

      const domains = {
          'instagram': 'https://www.instagram.com/',
          'facebook': 'https://www.facebook.com/',
          'twitter': 'https://twitter.com/',
          'tiktok': 'https://www.tiktok.com/@',
          'youtube': 'https://www.youtube.com/@',
          'linkedin': 'https://www.linkedin.com/company/'
      };

      return domains[platform] + handle;
  }

  function formatWhatsApp(rawPhone) {
      if (!rawPhone) return '';
      let digits = String(rawPhone).replace(/[^0-9+]/g, '');
      if (digits.startsWith('00')) digits = '+' + digits.slice(2);
      digits = digits.replace('+', ''); 
      if (digits.length >= 10) return 'https://wa.me/' + digits;
      return '';
  }

  function expandCountry(code) {
    if (!code) return '';
    code = code.trim().toUpperCase();
    if (code.length === 2) {
      try { return regionNames.of(code); } catch(e) { return code; }
    }
    return code; 
  }

  function normalizeStr(str) {
      return String(str).toLowerCase().replace(/[^a-z0-9]/g, '');
  }

  function processCSV(rows, headers) {
    const normalizedHeaders = headers.map(h => ({ original: h, normalized: normalizeStr(h) }));

    const getVal = (row, keys, excludes = []) => {
      const normalizedKeys = keys.map(normalizeStr);
      const normalizedExcludes = excludes.map(normalizeStr);

      for (let headerObj of normalizedHeaders) {
          const isMatch = normalizedKeys.some(key => headerObj.normalized.includes(key));
          const isExcluded = normalizedExcludes.some(ex => headerObj.normalized.includes(ex));
          
          if (isMatch && !isExcluded) {
              const val = row[headerObj.original];
              if (val && String(val).trim() !== '') return String(val).trim();
          }
      }
      return '';
    };

    const newLeads = rows.map((row, idx) => {
      let url = getVal(row, ['domain', 'store', 'website', 'url'], ['image', 'link']);
      let name = getVal(row, ['company name', 'name', 'title']);
      if (!name && url) name = url.replace('www.', '').split('.')[0];
      
      let email = getVal(row, ['emails', 'email 1', 'email']);
      if (email && email.includes(',')) email = email.split(',')[0].trim();
      
      let city = getVal(row, ['city']);
      let state = getVal(row, ['state', 'region', 'province']);
      let rawCountry = getVal(row, ['country', 'country code']);
      let country = expandCountry(rawCountry);
      
      let locationParts = [city, state, country].filter(part => part && part.length > 0);
      let location = locationParts.join(', ');

      const socEx = ['follower', 'following', 'count', 'audience'];
      let ig = buildSocialLink(getVal(row, ['instagram link', 'instagram url', 'instagram', 'ig'], socEx), 'instagram');
      let fb = buildSocialLink(getVal(row, ['facebook link', 'facebook url', 'facebook', 'fb'], socEx), 'facebook');
      let tw = buildSocialLink(getVal(row, ['twitter link', 'twitter url', 'twitter', 'x.com', 'x link'], socEx), 'twitter');
      let tt = buildSocialLink(getVal(row, ['tiktok link', 'tiktok url', 'tiktok'], socEx), 'tiktok');
      let yt = buildSocialLink(getVal(row, ['youtube link', 'youtube url', 'youtube', 'yt'], socEx), 'youtube');
      let li = buildSocialLink(getVal(row, ['linkedin link', 'linkedin url', 'linkedin'], socEx), 'linkedin');

      let rawPhone = getVal(row, ['phones', 'phone 1', 'phone', 'mobile', 'whatsapp']);
      let wa = formatWhatsApp(rawPhone);
      
      return {
        id: 'L' + Date.now() + idx,
        name: name || 'Unknown Brand',
        url: url,
        email: email,
        location: location,
        ig, fb, tw, tt, yt, li, wa,
        niche: getVal(row, ['niche', 'category', 'industry']) || 'E-commerce',
        followers: getVal(row, ['follower', 'audience', 'products'], ['link', 'url', 'profile']),
        status: 'Not Contacted'
      };
    });

    leads = [...leads, ...newLeads];
    saveData();
    filterAndRender();
    
    dropZoneText.innerHTML = '<div class="upload-title">Drop Bootleads CSV Here</div><div style="color: var(--muted2);">Processed locally. Zero server uploads.</div>';
  }

  function filterAndRender() {
    if (leads.length === 0) {
      dropZone.style.display = 'block';
      leadsBar.style.display = 'none';
      leadsGrid.innerHTML = '';
      return;
    }

    dropZone.style.display = 'none';
    leadsBar.style.display = 'flex';

    const search = document.getElementById('search').value.toLowerCase();
    const statusFilter = document.getElementById('filter-status').value;
    const platformFilter = document.getElementById('filter-platform').value;

    filteredLeads = leads.filter(l => {
      const matchSearch = l.name.toLowerCase().includes(search) || 
                          l.niche.toLowerCase().includes(search) || 
                          (l.location && l.location.toLowerCase().includes(search));
      const matchStatus = statusFilter === 'All' || l.status === statusFilter;
      
      let matchPlatform = true;
      if (platformFilter !== 'All') {
          matchPlatform = !!l[platformFilter]; 
      }

      return matchSearch && matchStatus && matchPlatform;
    });

    renderGridChunk();
    updateStats();
  }

  function renderGridChunk() {
    const toRender = filteredLeads.slice(0, displayCount);
    
    leadsGrid.innerHTML = toRender.map(l => `
      <div class="lcard" id="card-${l.id}" data-status="${l.status}">
        <div class="lcard-head">
          <div class="lcard-name">${l.name}</div>
        </div>
        <div class="niche-tag">${l.niche}</div>
        
        <div class="info-list">
          <div class="info-row"><span class="ii"><i class="fa-regular fa-envelope"></i></span><span class="iv ${l.email ? '' : 'miss'}">${l.email ? `<a href="mailto:${l.email}">${l.email}</a>` : 'No email found'}</span></div>
          <div class="info-row"><span class="ii"><i class="fa-solid fa-cart-shopping"></i></span><span class="iv ${l.url ? '' : 'miss'}">${l.url ? `<a href="${l.url.startsWith('http') ? l.url : 'https://'+l.url}" target="_blank">${l.url.replace('https://','').replace('http://','')}</a>` : 'No store URL'}</span></div>
          ${l.location ? `<div class="info-row"><span class="ii"><i class="fa-solid fa-location-dot"></i></span><span class="iv" style="color:var(--text); font-weight:500;">${l.location}</span></div>` : ''}
          ${l.followers ? `<div class="info-row"><span class="ii"><i class="fa-solid fa-box-open"></i></span><span class="iv">${l.followers}</span></div>` : ''}
        </div>

        <div class="socials-row">
          ${l.ig ? `<a href="${l.ig}" target="_blank" class="social-btn ig" title="Instagram"><i class="fa-brands fa-instagram"></i> IG</a>` : ''}
          ${l.wa ? `<a href="${l.wa}" target="_blank" class="social-btn wa" title="WhatsApp"><i class="fa-brands fa-whatsapp"></i> WA</a>` : ''}
          ${l.fb ? `<a href="${l.fb}" target="_blank" class="social-btn fb" title="Facebook"><i class="fa-brands fa-facebook-f"></i> FB</a>` : ''}
          ${l.tw ? `<a href="${l.tw}" target="_blank" class="social-btn tw" title="X / Twitter"><i class="fa-brands fa-x-twitter"></i> X</a>` : ''}
          ${l.li ? `<a href="${l.li}" target="_blank" class="social-btn in" title="LinkedIn"><i class="fa-brands fa-linkedin-in"></i> IN</a>` : ''}
        </div>

        <div class="status-row" style="margin-bottom:0;">
          <span class="status-label">Pipeline Status</span>
          <select class="status-sel" onchange="updateStatus('${l.id}', this.value)">
            <option value="Not Contacted" ${l.status === 'Not Contacted' ? 'selected' : ''}>Not Contacted</option>
            <option value="Emailed" ${l.status === 'Emailed' ? 'selected' : ''}>Emailed</option>
            <option value="Replied" ${l.status === 'Replied' ? 'selected' : ''}>Replied</option>
            <option value="Closed" ${l.status === 'Closed' ? 'selected' : ''}>Closed 🎉</option>
            <option value="Discarded" ${l.status === 'Discarded' ? 'selected' : ''}>Discarded 🗑️</option>
          </select>
        </div>

        <div class="card-btns">
          <button class="cb" onclick="openProfile('${l.id}')"><i class="fa-regular fa-id-card"></i> View Full Profile</button>
        </div>
      </div>
    `).join('');

    if (displayCount < filteredLeads.length) {
      leadsGrid.innerHTML += `<div class="load-more-container"><span style="color:var(--muted2); font-size:12px;"><i class="fa-solid fa-spinner fa-spin"></i> Scroll for more leads...</span></div>`;
    }
  }

  function updateStatus(id, val) {
    const lead = leads.find(l => l.id === id);
    if (lead) { 
      lead.status = val; 
      saveData(); 
      updateStats(); 
      
      const card = document.getElementById(`card-${id}`);
      if (card) {
        card.setAttribute('data-status', val);
      }
    }
  }

  function updateStats() {
    document.getElementById('stat-total').innerText = leads.length;
    document.getElementById('stat-contacted').innerText = leads.filter(l => l.status !== 'Not Contacted' && l.status !== 'Discarded').length;
  }

  function openProfile(id) {
    const l = leads.find(x => x.id === id);
    if(!l) return;

    document.getElementById('pm-brand').innerText = l.name;
    document.getElementById('pm-niche').innerText = l.niche;
    
    const urlEl = document.getElementById('pm-url');
    if(l.url) {
      urlEl.href = l.url.startsWith('http') ? l.url : 'https://'+l.url;
      urlEl.innerText = l.url;
      urlEl.style.display = 'block';
    } else {
      urlEl.style.display = 'none';
    }

    document.getElementById('pm-location').innerText = l.location || 'No location provided';
    document.getElementById('pm-email').innerHTML = l.email ? `<a href="mailto:${l.email}" style="color:var(--accent2);">${l.email}</a>` : 'No email provided';
    document.getElementById('pm-followers').innerText = l.followers || 'No data';

    let socialsHtml = '';
    if(l.ig) socialsHtml += `<a href="${l.ig}" target="_blank" class="social-btn ig"><i class="fa-brands fa-instagram"></i> Instagram</a>`;
    if(l.wa) socialsHtml += `<a href="${l.wa}" target="_blank" class="social-btn wa"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>`;
    if(l.fb) socialsHtml += `<a href="${l.fb}" target="_blank" class="social-btn fb"><i class="fa-brands fa-facebook-f"></i> Facebook</a>`;
    if(l.tw) socialsHtml += `<a href="${l.tw}" target="_blank" class="social-btn tw"><i class="fa-brands fa-x-twitter"></i> X (Twitter)</a>`;
    if(l.tt) socialsHtml += `<a href="${l.tt}" target="_blank" class="social-btn"><i class="fa-brands fa-tiktok"></i> TikTok</a>`;
    if(l.yt) socialsHtml += `<a href="${l.yt}" target="_blank" class="social-btn yt"><i class="fa-brands fa-youtube"></i> YouTube</a>`;
    if(l.li) socialsHtml += `<a href="${l.li}" target="_blank" class="social-btn in"><i class="fa-brands fa-linkedin-in"></i> LinkedIn</a>`;
    
    document.getElementById('pm-socials').innerHTML = socialsHtml || '<span style="color:var(--muted); font-size:12px;">No social channels found</span>';

    document.getElementById('profile-modal').classList.add('open');
  }

  function closeProfile() {
    document.getElementById('profile-modal').classList.remove('open');
  }

  function saveData() { localStorage.setItem('tmx_leads_v16', JSON.stringify(leads)); }
  
  function clearData() { 
    if(confirm('Are you sure you want to clear all leads?')) { 
        leads = []; 
        saveData(); 
        filterAndRender();
        document.getElementById('file-input').value = ''; 
    } 
  }
</script>

</body>
